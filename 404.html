<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>404 — El Void te reclama</title>
    <meta name="description" content="Has llegado al Void. Esta página no existe en el Purgatorio." />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; img-src 'self' data: https://cdn.discordapp.com; object-src 'none'; connect-src 'self' https://va.vercel-scripts.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Cormorant+Garamond:ital,wght@0,500;0,700;1,500&family=UnifrakturMaguntia&display=swap"
      onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Cormorant+Garamond:ital,wght@0,500;0,700;1,500&family=UnifrakturMaguntia&display=swap"></noscript>
    <link rel="icon" href="static/img/logo.svg" type="image/svg+xml">
    <meta name="theme-color" content="#08020a">
    <link rel="stylesheet" href="static/css/tokens.css">
    <link rel="stylesheet" href="static/css/styles.css">
    <style>
      .void-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: var(--space-6);
        text-align: center;
      }
      .void-content {
        max-width: 560px;
      }
      .void-number {
        font-family: var(--font-display);
        font-size: clamp(6rem, 20vw, 12rem);
        color: var(--blood);
        line-height: 1;
        text-shadow: 0 0 60px rgba(168,0,31,0.5);
        display: block;
        margin-bottom: var(--space-3);
      }
      .void-title {
        font-family: var(--font-display);
        font-size: var(--fs-2xl);
        color: var(--text);
        margin-bottom: var(--space-4);
      }
      .void-desc {
        font-family: var(--font-serif);
        font-style: italic;
        font-size: var(--fs-md);
        color: var(--text-muted);
        line-height: 1.6;
        margin-bottom: var(--space-6);
      }
      .void-quote {
        font-family: var(--font-serif);
        font-style: italic;
        font-size: var(--fs-sm);
        color: var(--text-dim);
        margin-top: var(--space-6);
        min-height: 1.5em;
      }
    </style>
  </head>
  <body>

    <div class="void-page">
      <div class="void-content">
        <div class="frame frame--highlight" style="padding: var(--space-8) var(--space-7)">
          <img src="static/img/ornaments/corner-tl.svg" class="frame-corner frame-corner-tl" alt="">
          <img src="static/img/ornaments/corner-tr.svg" class="frame-corner frame-corner-tr" alt="">
          <img src="static/img/ornaments/corner-bl.svg" class="frame-corner frame-corner-bl" alt="">
          <img src="static/img/ornaments/corner-br.svg" class="frame-corner frame-corner-br" alt="">

          <div class="divider" style="margin-top:0"><span class="divider-text">El Void</span></div>
          <span class="void-number">404</span>
          <h1 class="void-title">Has caído al Void</h1>
          <p class="void-desc">Esta región del Purgatorio no existe — o fue borrada por el Staff. El vacío entre los mundos te ha reclamado temporalmente.</p>

          <div style="display:flex; gap: var(--space-4); justify-content:center; flex-wrap:wrap">
            <a href="index.html" class="btn btn-blood">Volver al Purgatorio</a>
            <a href="mapa.html" class="btn">Explorar el Mapa</a>
          </div>

          <p class="void-quote" id="void-quote"></p>
        </div>
      </div>
    </div>

    <script src="static/js/scripts.js" defer></script>
    <script src="static/js/easter-eggs.js" defer></script>
    <script src="static/js/void-quotes.js" defer></script>
  </body>
</html>
