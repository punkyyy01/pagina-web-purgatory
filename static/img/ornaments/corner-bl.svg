<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Líneas del marco L (espejado vertical) -->
  <line x1="8" y1="28" x2="32" y2="28" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4" y1="0" x2="4" y2="24" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Línea interior sutil -->
  <line x1="8" y1="25" x2="32" y2="25" stroke="currentColor" stroke-width="0.6" stroke-linecap="round" opacity="0.38"/>
  <line x1="7" y1="0" x2="7" y2="24" stroke="currentColor" stroke-width="0.6" stroke-linecap="round" opacity="0.38"/>
  <!-- Diamante en la esquina -->
  <polygon points="4,24 8,28 4,32 0,28" fill="currentColor"/>
  <!-- Marcas decorativas -->
  <line x1="18" y1="24.5" x2="18" y2="28" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
  <line x1="4" y1="14" x2="7.5" y2="14" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
</svg>
