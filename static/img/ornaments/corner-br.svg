<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Líneas del marco L (doble espejo) -->
  <line x1="0" y1="28" x2="24" y2="28" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="28" y1="0" x2="28" y2="24" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Línea interior sutil -->
  <line x1="0" y1="25" x2="24" y2="25" stroke="currentColor" stroke-width="0.6" stroke-linecap="round" opacity="0.38"/>
  <line x1="25" y1="0" x2="25" y2="24" stroke="currentColor" stroke-width="0.6" stroke-linecap="round" opacity="0.38"/>
  <!-- Diamante en la esquina -->
  <polygon points="28,24 32,28 28,32 24,28" fill="currentColor"/>
  <!-- Marcas decorativas -->
  <line x1="14" y1="24.5" x2="14" y2="28" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
  <line x1="24.5" y1="14" x2="28" y2="14" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
</svg>
