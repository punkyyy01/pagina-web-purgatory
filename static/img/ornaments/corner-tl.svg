<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Líneas del marco L -->
  <line x1="8" y1="4" x2="32" y2="4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4" y1="8" x2="4" y2="32" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Línea interior sutil -->
  <line x1="8" y1="7" x2="32" y2="7" stroke="currentColor" stroke-width="0.6" stroke-linecap="round" opacity="0.38"/>
  <line x1="7" y1="8" x2="7" y2="32" stroke="currentColor" stroke-width="0.6" stroke-linecap="round" opacity="0.38"/>
  <!-- Diamante en la esquina -->
  <polygon points="4,0 8,4 4,8 0,4" fill="currentColor"/>
  <!-- Marcas decorativas a media distancia -->
  <line x1="18" y1="4" x2="18" y2="7.5" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
  <line x1="4" y1="18" x2="7.5" y2="18" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
</svg>
