<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Líneas del marco L (espejado horizontal) -->
  <line x1="0" y1="4" x2="24" y2="4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="28" y1="8" x2="28" y2="32" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Línea interior sutil -->
  <line x1="0" y1="7" x2="24" y2="7" stroke="currentColor" stroke-width="0.6" stroke-linecap="round" opacity="0.38"/>
  <line x1="25" y1="8" x2="25" y2="32" stroke="currentColor" stroke-width="0.6" stroke-linecap="round" opacity="0.38"/>
  <!-- Diamante en la esquina -->
  <polygon points="28,0 32,4 28,8 24,4" fill="currentColor"/>
  <!-- Marcas decorativas -->
  <line x1="14" y1="4" x2="14" y2="7.5" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
  <line x1="24.5" y1="18" x2="28" y2="18" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
</svg>
